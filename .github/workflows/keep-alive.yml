name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes, 24/7
  workflow_dispatch:         # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -sf https://finsight-ai-backend-imxn.onrender.com/api/health \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            || echo "Ping failed (backend may be starting up)"
